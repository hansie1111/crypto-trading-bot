name: Daily Crypto Report

on:
  schedule:
    - cron: '30 6 * * *'   # 08:30 NL (Ochtend rapport, NA breakout scan)
    - cron: '0 16 * * *'   # 18:00 NL (Avond rapport, NA breakout scan)
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests pandas numpy
    
    - name: Run crypto analysis
      env:
        EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python btc_eth_market_analysis.py
