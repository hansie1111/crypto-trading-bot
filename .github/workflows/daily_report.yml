name: Daily Crypto Report

  schedule:
    - cron: '50 5 * * *'   # 07:50 NL (Hoofd)
    - cron: '55 5 * * *'   # 07:55 NL (Backup) ← Aangepast!
    - cron: '20 15 * * *'  # 17:20 NL (Hoofd)
    - cron: '25 15 * * *'  # 17:25 NL (Backup) ← Aangepast!
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests pandas numpy
    
    - name: Run crypto analysis
      env:
        EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python btc_eth_market_analysis.py
